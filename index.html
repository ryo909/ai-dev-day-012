<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day012 — Weighted Option Calculator</title><meta name="description" content="重み付き評価で候補案の順位変化を比較できる計算ツール。（話題:HN Frontpage）"><link rel="stylesheet" href="/src/style.css"></head>
<body><div id="app"><h1>Weighted Option Calculator</h1><p>重み付き評価で候補案の順位変化を比較できる計算ツール。（話題:HN Frontpage）</p><div class="dash"><section class="panel"><h2>Weights</h2><label>Speed <input id="wSpeed" type="range" min="0" max="100" value="40"></label><label>Quality <input id="wQuality" type="range" min="0" max="100" value="35"></label><label>Cost <input id="wCost" type="range" min="0" max="100" value="25"></label><p class="meter" id="weightMeter"></p></section><section class="panel"><h2>Options</h2><input id="optionName" placeholder="候補名"><input id="optionSpeed" type="number" min="1" max="5" placeholder="Speed 1-5"><input id="optionQuality" type="number" min="1" max="5" placeholder="Quality 1-5"><input id="optionCost" type="number" min="1" max="5" placeholder="Cost 1-5"><button id="addOptionBtn">候補追加</button><button id="recalcBtn">再計算</button><table><thead><tr><th>Option</th><th>Score</th></tr></thead><tbody id="scoreTable"></tbody></table></section></div><p><a href="https://github.com/ryo909/ai-dev-day-012" target="_blank" rel="noopener">GitHub</a></p></div><script type="module" src="/src/main.js"></script></body></html>
