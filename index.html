<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day012 — Context Switch Cost Meter</title>
  <meta name="description" content="タスク切替の見えない損失を可視化する生産性分析ツール。（話題:HN Frontpage）">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-badge">Day012</div>
      <h1 class="header-title">Context Switch Cost Meter</h1>
      <p class="header-desc">タスク切替の見えない損失を可視化する生産性分析ツール。（話題:HN Frontpage）</p>
    </header>
    <main class="app-main">
      <section class="tool-area">
        <div class="input-group">
          <label for="toolInput" class="input-label">タスク遷移</label>
          <textarea id="toolInput" class="input-textarea" rows="6" placeholder="設計-&gt;実装-&gt;レビュー-&gt;会議-&gt;実装"></textarea>
        </div>
        <button id="actionBtn" class="btn-primary">見積もる</button>
        <div class="output-group" id="outputGroup" style="display:none">
          <label class="input-label">切替コスト見積</label>
          <div id="toolOutput" class="output-area"></div>
        </div>
      </section>
    </main>
    <footer class="app-footer">
      <span>Day012 — 切替ロスを数字で可視化</span>
      <a href="https://github.com/ryo909/ai-dev-day-012" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
